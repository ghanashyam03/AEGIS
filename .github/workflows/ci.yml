name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.19"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --locked
      - run: uv run ruff format --check
      - run: uv run ruff check
      - run: uv run mypy src
      - run: uv run pytest
