repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check
        language: system
        types: [python]
      - id: ruff
        name: ruff lint
        entry: uv run ruff check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
